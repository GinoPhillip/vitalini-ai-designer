<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Rainbow Vitalini wordmark pattern on black">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a71d2b"/>
      <stop offset=".18" stop-color="#d66516"/>
      <stop offset=".36" stop-color="#d7ae14"/>
      <stop offset=".51" stop-color="#668f36"/>
      <stop offset=".66" stop-color="#199498"/>
      <stop offset=".81" stop-color="#315fb0"/>
      <stop offset=".92" stop-color="#80418b"/>
      <stop offset="1" stop-color="#ae245e"/>
    </linearGradient>
    <pattern id="wordmarks" width="430" height="190" patternUnits="userSpaceOnUse" patternTransform="rotate(-33)">
      <svg x="22" y="57" width="320" height="60" viewBox="250 60 640 120" preserveAspectRatio="none">
        <image href="vitalini-logo.png" width="1019" height="237"/>
      </svg>
    </pattern>
    <mask id="wordmark-mask">
      <rect width="1600" height="1200" fill="url(#wordmarks)"/>
    </mask>
  </defs>
  <rect width="1600" height="1200" fill="#020202"/>
  <rect width="1600" height="1200" fill="url(#spectrum)" mask="url(#wordmark-mask)" opacity=".94"/>
</svg>
