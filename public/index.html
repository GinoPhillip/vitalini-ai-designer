<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f6f2" />
    <meta name="description" content="Design a one-of-one Vitalini jacket with AI and preview it live in 3D." />
    <title>Vitalini Custom Designer</title>
    <link rel="preconnect" href="https://static.sketchfab.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Interactive 3D jacket preview">
        <div class="stage__ambient" aria-hidden="true"></div>
        <iframe
          id="viewer"
          title="Interactive 3D jacket"
          allow="autoplay; fullscreen"
        ></iframe>
        <div class="design-switcher" aria-label="Saved design navigation">
          <div class="design-switcher__count">
            <span>Your designs</span>
            <strong id="historyPosition">0 / 0</strong>
          </div>
          <div class="design-switcher__nav">
            <button id="previousButton" type="button" aria-label="Previous design" disabled>←</button>
            <button id="nextButton" type="button" aria-label="Next design" disabled>→</button>
          </div>
        </div>
      </section>

      <aside class="studio" aria-label="Design controls">
        <header class="studio__header">
          <img src="./assets/vitalini-logo.png" alt="Vitalini" />
        </header>

        <div class="studio__content">
          <section class="control-section">
            <div class="section-heading">
              <div><h1>Choose your jacket</h1></div>
            </div>
            <div class="field-grid">
              <div class="field-control">
                <span class="field-control__label" id="collectionLabel">Collection</span>
                <div class="select-picker" data-select="typeSelect">
                  <button class="select-picker__trigger" type="button" aria-labelledby="collectionLabel typeSelectValue" aria-expanded="false" aria-controls="typeSelectMenu">
                    <span class="select-picker__value" id="typeSelectValue">Jackets</span>
                    <span class="select-picker__chevron" aria-hidden="true">⌄</span>
                  </button>
                  <div class="select-picker__menu" id="typeSelectMenu" role="listbox" aria-labelledby="collectionLabel" hidden></div>
                </div>
                <select id="typeSelect" aria-hidden="true" hidden></select>
              </div>
              <div class="field-control">
                <span class="field-control__label" id="modelLabel">Model</span>
                <div class="select-picker" data-select="modelSelect">
                  <button class="select-picker__trigger" type="button" aria-labelledby="modelLabel modelSelectValue" aria-expanded="false" aria-controls="modelSelectMenu">
                    <span class="select-picker__value" id="modelSelectValue">VP9655</span>
                    <span class="select-picker__chevron" aria-hidden="true">⌄</span>
                  </button>
                  <div class="select-picker__menu" id="modelSelectMenu" role="listbox" aria-labelledby="modelLabel" hidden></div>
                </div>
                <select id="modelSelect" aria-hidden="true" hidden></select>
              </div>
            </div>
          </section>

          <section class="control-section control-section--prompt">
            <div class="section-heading">
              <div><h2>Describe your design</h2><p>Try a color story, pattern, mood, or material finish.</p></div>
            </div>
            <label class="prompt-field">
              <span class="sr-only">Design prompt</span>
              <textarea id="prompt" maxlength="800" placeholder="A sharp alpine camouflage in glacier blue and ink, with restrained tonal contour lines…"></textarea>
              <span id="promptCount">0 / 800</span>
            </label>
            <div class="prompt-presets" aria-label="Prompt ideas">
              <button type="button" data-prompt="Minimal alpine geometry in ice blue, bone white, and deep navy">Alpine minimal</button>
              <button type="button" data-prompt="Energetic abstract racing stripes in orange, scarlet, and black">Race energy</button>
              <button type="button" data-prompt="Quiet tonal topographic lines in charcoal and graphite">Tonal contour</button>
            </div>
            <button class="generate-button" id="generateButton" type="button" disabled>
              <span>Generate design</span><b aria-hidden="true">↗</b>
            </button>
          </section>

          <section class="control-section" id="materialsSection">
            <div class="section-heading section-heading--compact">
              <div><h2>Customize the details</h2><p>Fine-tune the trim colors independently.</p></div>
            </div>
            <div id="materialControls" class="material-controls"></div>
          </section>

          <section class="control-section export-section">
            <button class="download-button" id="downloadButton" type="button" disabled>Download current texture</button>
          </section>
        </div>

        <footer>Designed with Vitalini AI</footer>
        <div class="generation-status" id="generationStatus" role="status" aria-live="polite"></div>
      </aside>
    </main>

    <script src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
